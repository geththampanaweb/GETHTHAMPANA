<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Complete Reservation</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body class="bg-black text-white min-h-screen">

<div class="max-w-3xl mx-auto py-16 px-6">

<h1 class="text-4xl font-bold text-yellow-400 mb-8">
Complete Your Reservation
</h1>

<div class="bg-white/10 p-6 rounded-2xl">

<h2 class="text-2xl mb-4">Selected Seats</h2>

<p id="seatDisplay" class="text-yellow-300 text-lg mb-8"></p>

<form id="reservationForm">

<input id="name" type="text" placeholder="Full Name" required
class="w-full p-4 rounded-xl text-black mb-4">

<input id="phone" type="tel" placeholder="Mobile Number" required
class="w-full p-4 rounded-xl text-black mb-4">

<input id="email" type="email" placeholder="Email Address" required
class="w-full p-4 rounded-xl text-black mb-4">

<input id="school" type="text" placeholder="School / Organization"
class="w-full p-4 rounded-xl text-black mb-4">

<textarea id="notes" placeholder="Special Notes"
class="w-full p-4 rounded-xl text-black mb-4"></textarea>

<button type="submit"
class="bg-yellow-400 text-black px-8 py-4 rounded-full font-bold">
Confirm Reservation
</button>

</form>

<div id="success" class="hidden mt-8 text-center">

<h2 class="text-3xl text-green-400 mb-4">
Reservation Successful 🎉
</h2>

<p class="text-gray-300 mb-4">
Your ticket QR code is below
</p>

<div id="qrcode" class="flex justify-center"></div>

<button onclick="window.print()"
class="mt-6 bg-white text-black px-6 py-3 rounded-full">
Print Ticket
</button>

</div>

</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* ---------------- SUPABASE ---------------- */
const supabaseUrl = "https://boipxcwvausglqctqdhr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvaXB4Y3d2YXVzZ2xxY3RxZGhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NzkxMjgsImV4cCI6MjA5NzI1NTEyOH0.bbCF-hmMj_p5GnIhBsjOrLYATztHAdm02FH7XjGAMe0"; // 🔥 FIX THIS

const supabase = createClient(supabaseUrl, supabaseKey);

/* ---------------- LOAD SEATS ---------------- */
const seats = JSON.parse(localStorage.getItem("selectedSeats")) || [];

document.getElementById("seatDisplay").innerText =
seats.length ? seats.join(", ") : "No seats selected";

/* ---------------- UNIQUE BOOKING ID ---------------- */
function generateBookingId() {
  return "GTH-" + Date.now();
}

/* ---------------- SUBMIT ---------------- */
document.getElementById("reservationForm").addEventListener("submit", async (e) => {
e.preventDefault();

const name = document.getElementById("name").value;
const phone = document.getElementById("phone").value;
const email = document.getElementById("email").value;
const school = document.getElementById("school").value;
const notes = document.getElementById("notes").value;

if (seats.length === 0) {
alert("No seats selected!");
return;
}

const bookingId = generateBookingId();

/* ---------------- INSERT ---------------- */
const { error } = await supabase.from("reservations").insert([{
name,
phone,
email,
school,
notes,
seats: JSON.stringify(seats),
booking_id: bookingId,
created_at: new Date().toISOString()
}]);

if (error) {
console.log(error);
alert("Reservation failed. Check Supabase RLS + key.");
return;
}

/* ---------------- UI SUCCESS ---------------- */
document.getElementById("reservationForm").style.display = "none";
document.getElementById("success").classList.remove("hidden");

/* ---------------- QR CODE ---------------- */
const qrData = JSON.stringify({
bookingId,
name,
phone,
seats
});

new QRCode(document.getElementById("qrcode"), {
text: qrData,
width: 220,
height: 220
});

/* ---------------- CLEAR STORAGE ---------------- */
localStorage.removeItem("selectedSeats");

});

</script>

</body>
</html>

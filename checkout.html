<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Reservation | ගෙත්තම්පාන</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>


<style>
#celebrationLayer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  overflow: hidden;
  z-index: 9999;
}

.confetti-piece {
  position: absolute;
  top: -20px;
  opacity: 0.95;
  animation-name: confetti-fall;
  animation-timing-function: linear;
  animation-fill-mode: forwards;
}

@keyframes confetti-fall {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(105vh) rotate(360deg);
    opacity: 0.9;
  }
}

.balloon-piece {
  position: absolute;
  top: -80px;
  opacity: 0.95;
  animation-name: balloon-fall;
  animation-timing-function: ease-in;
  animation-fill-mode: forwards;
}

.balloon-piece svg {
  display: block;
}

@keyframes balloon-fall {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(105vh) rotate(15deg);
    opacity: 0.95;
  }
}
</style>

</head>

<body class="bg-black text-white min-h-screen">

<div id="celebrationLayer"></div>


<div class="max-w-3xl mx-auto py-16 px-6">

<h1 class="text-4xl font-bold text-yellow-400 mb-8">
Complete Your Reservation
</h1>

<div class="bg-white/10 p-6 rounded-2xl">

<h2 class="text-2xl mb-4">
Selected Seats
</h2>

<p id="seatDisplay" class="text-yellow-300 text-lg mb-8">
Loading...
</p>

<form id="reservationForm">

<input
id="name"
type="text"
placeholder="Full Name"
required
class="w-full p-4 rounded-xl text-black mb-4">

<input
id="phone"
type="tel"
placeholder="Mobile Number"
required
class="w-full p-4 rounded-xl text-black mb-4">

<input
id="email"
type="email"
placeholder="Email Address"
required
class="w-full p-4 rounded-xl text-black mb-4">

<input
id="school"
type="text"
placeholder="School / Organization"
class="w-full p-4 rounded-xl text-black mb-4">

<textarea
id="notes"
placeholder="Special Notes"
class="w-full p-4 rounded-xl text-black mb-4"></textarea>

<button
type="submit"
class="bg-yellow-400 text-black px-8 py-4 rounded-full font-bold hover:scale-105 transition">
Confirm Reservation
</button>

</form>

<div id="success" class="hidden mt-8 text-center">

<h2 class="text-3xl text-green-400 mb-4">
Reservation Successful 🎉
</h2>

<p class="text-gray-300 mb-4">
Your reservation has been recorded successfully.
</p>

<div id="bookingDetails" class="mb-6 text-left bg-white/5 p-4 rounded-xl"></div>

<p class="text-gray-300 mb-4">
Your QR code:
</p>

<div id="qrcode" class="flex justify-center"></div>

<button
onclick="window.print()"
class="mt-6 bg-white text-black px-6 py-3 rounded-full">
Print Ticket
</button>

</div>

</div>

</div>

<footer class="py-10 text-center text-gray-500">
© 2026 ගෙත්තම්පාන
</footer>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

/* ---------------- FIREBASE CONFIG ---------------- */

const firebaseConfig = {
apiKey: "AIzaSyDaIzeEQkOrziNSXlRHWv-509hYZb4Y7vY",
authDomain: "geththampana-reservations.firebaseapp.com",
projectId: "geththampana-reservations",
storageBucket: "geththampana-reservations.firebasestorage.app",
messagingSenderId: "706440471161",
appId: "1:706440471161:web:d32183dccadad1b835eaa8",
measurementId: "G-R7Y10WQXZ1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app, "geththampana");

/* ---------------- LOAD SELECTED SEATS ---------------- */

const seats =
JSON.parse(localStorage.getItem("selectedSeats")) || [];

document.getElementById("seatDisplay").innerText =
seats.length
? seats.join(", ")
: "No seats selected";

/* ---------------- BOOKING ID ---------------- */

function generateBookingId() {

return "GTH-" +
Date.now() +
"-" +
Math.floor(Math.random() * 1000);

}

/* ---------------- CELEBRATION ANIMATION ---------------- */

function triggerCelebration() {

const layer = document.getElementById("celebrationLayer");

layer.innerHTML = "";

const confettiColors = [
"#FBBF24", "#F87171", "#34D399", "#60A5FA",
"#A78BFA", "#F472B6", "#FCD34D", "#38BDF8"
];

const balloonColors = [
"#F87171", "#FBBF24", "#34D399", "#60A5FA", "#F472B6", "#A78BFA"
];

/* Glitter / confetti pieces */

for (let i = 0; i < 80; i++) {

const piece = document.createElement("div");

piece.className = "confetti-piece";

const size = 6 + Math.random() * 6;
const color =
confettiColors[Math.floor(Math.random() * confettiColors.length)];
const left = Math.random() * 100;
const duration = 0.7 + Math.random() * 0.5;
const delay = Math.random() * 0.2;
const shape = Math.random() > 0.5 ? "50%" : "2px";

piece.style.left = left + "vw";
piece.style.width = size + "px";
piece.style.height = size + "px";
piece.style.background = color;
piece.style.borderRadius = shape;
piece.style.animationDuration = duration + "s";
piece.style.animationDelay = delay + "s";

layer.appendChild(piece);

}

/* Balloons */

const balloonSVG = (color) => `
<svg width="40" height="55" viewBox="0 0 40 55" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="20" cy="20" rx="18" ry="20" fill="${color}"/>
<polygon points="16,38 24,38 20,45" fill="${color}"/>
<line x1="20" y1="45" x2="20" y2="55" stroke="#999" stroke-width="1"/>
</svg>
`;

for (let i = 0; i < 12; i++) {

const balloon = document.createElement("div");

balloon.className = "balloon-piece";

const color =
balloonColors[Math.floor(Math.random() * balloonColors.length)];
const left = Math.random() * 95;
const duration = 0.9 + Math.random() * 0.3;
const delay = Math.random() * 0.15;

balloon.style.left = left + "vw";
balloon.style.animationDuration = duration + "s";
balloon.style.animationDelay = delay + "s";
balloon.innerHTML = balloonSVG(color);

layer.appendChild(balloon);

}

/* Clean up after ~1 second */

setTimeout(() => {

layer.innerHTML = "";

}, 1200);

}

/* ---------------- FORM SUBMIT ---------------- */

document
.getElementById("reservationForm")
.addEventListener("submit", async (e) => {

e.preventDefault();

const name =
document.getElementById("name").value.trim();

const phone =
document.getElementById("phone").value.trim();

const email =
document.getElementById("email").value.trim();

const school =
document.getElementById("school").value.trim();

const notes =
document.getElementById("notes").value.trim();

if(seats.length === 0){

alert("Please select seats first.");

return;

}

const bookingId = generateBookingId();

try {

await addDoc(
collection(db, "reservations"),
{
name,
phone,
email,
school,
notes,
seats,
bookingId,
created_at: new Date().toISOString()
}
);

/* ---------------- SUCCESS SCREEN ---------------- */

document
.getElementById("reservationForm")
.style.display = "none";

document
.getElementById("success")
.classList.remove("hidden");

triggerCelebration();

document
.getElementById("bookingDetails")
.innerHTML = `
<p><strong>Booking ID:</strong> ${bookingId}</p>
<p><strong>Name:</strong> ${name}</p>
<p><strong>Seats:</strong> ${seats.join(", ")}</p>
`;

/* ---------------- QR CODE ---------------- */

const qrData = JSON.stringify({
bookingId,
name,
phone,
email,
seats
});

new QRCode(
document.getElementById("qrcode"),
{
text: qrData,
width: 220,
height: 220
}
);

/* ---------------- CLEAR STORAGE ---------------- */

localStorage.removeItem("selectedSeats");

}
catch(error){

console.error(error);

alert(
"Reservation failed. Check Firebase Firestore setup and rules."
);

}

});

</script>

</body>
</html>

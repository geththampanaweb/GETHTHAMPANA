<style>

<body class="text-white">

<script>

const seatMap = document.getElementById('seatMap');
let selected = [];

/* ---------- CREATE SEATS ---------- */

let seatNumber = 1;

for(let row=1; row<=5; row++){
  let rowDiv=document.createElement('div');
  rowDiv.className="flex justify-center gap-2";

  for(let seat=1; seat<=15; seat++){
    createSeat(rowDiv, seatNumber, 'vip');
    seatNumber++;
  }
  seatMap.appendChild(rowDiv);
}

for(let row=1; row<=10; row++){
  let rowDiv=document.createElement('div');
  rowDiv.className="flex justify-center gap-2";

  for(let seat=1; seat<=20; seat++){
    createSeat(rowDiv, seatNumber, 'premium');
    seatNumber++;
  }
  seatMap.appendChild(rowDiv);
}

for(let row=1; row<=6; row++){
  let rowDiv=document.createElement('div');
  rowDiv.className="flex justify-center gap-2";

  for(let seat=1; seat<=15; seat++){
    createSeat(rowDiv, seatNumber, 'standard');
    seatNumber++;
  }
  seatMap.appendChild(rowDiv);
}

/* ---------- CREATE SEAT FUNCTION ---------- */

function createSeat(parent,id,type){

const seat = document.createElement('div');

seat.className = `seat ${type}`;
seat.innerText = id;
seat.dataset.id = id;

seat.onclick = () => {

if(seat.classList.contains('booked')) return;
if(seat.classList.contains('locked')) return;

if(seat.classList.contains('selected')){
  seat.classList.remove('selected');
  selected = selected.filter(x => x !== id);
} else {
  seat.classList.add('selected');
  if(!selected.includes(id)){
    selected.push(id);
  }
}

updateSummary();

};

parent.appendChild(seat);
}

/* ---------- UPDATE UI ---------- */

function updateSummary(){
document.getElementById('selectedSeats').innerText =
selected.length ? selected.join(', ') : 'None';

document.getElementById('seatCount').innerText =
selected.length;
}

/* ---------- CHECKOUT ---------- */

document.getElementById("checkoutBtn").addEventListener("click", () => {

if(selected.length === 0){
alert("Please select at least one seat.");
return;
}

localStorage.setItem("selectedSeats", JSON.stringify(selected));

window.location.href = "checkout.html";

});
</script>









<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://boipxcwvausglqctqdhr.supabase.co";
const supabaseKey = "sb_publishable_3nBfDmRJtkjOEjmMRUOEOQ_tIycECnt";

window.supabase = createClient(supabaseUrl, supabaseKey);

async function loadBookedSeats() {

const { data, error } = await supabase
.from("reservations")
.select("seats");

if(error) return;

let booked = [];

data.forEach(r => {
try {
booked = booked.concat(JSON.parse(r.seats));
} catch(e) {
console.log("Skipping bad data");
}
});

document.querySelectorAll(".seat").forEach(seat => {

let id = parseInt(seat.dataset.id);

if(booked.includes(id)) {
  seat.classList.add("booked");
  seat.classList.add("locked");

  seat.classList.remove("selected");
  selected = selected.filter(x => x !== id);

  seat.style.pointerEvents = "none";

  updateSummary();
}

});

}

loadBookedSeats();

// 🔥 AUTO REFRESH EVERY 5 SECONDS
setInterval(loadBookedSeats, 5000);

</script>

</body>

<script>

const seatMap = document.getElementById('seatMap');
let selected = [];

/* ---------- CREATE SEATS ---------- */

/* ---------- CREATE SEATS ---------- */

let seatNumber = 1;

/* Create rows */

function createRows(parent, rows, cols, type, order){

/* order = "column" -> column 1 numbered top-to-bottom first, then column 2, etc.
   order = "row"    -> row 1 numbered left-to-right first, then row 2, etc.
   Defaults to "column" if not specified. */

order = order || "column";

const grid = [];

for(let row=0; row<rows; row++){
grid.push(new Array(cols));
}

if(order === "row"){

for(let row=0; row<rows; row++){
for(let col=0; col<cols; col++){
grid[row][col] = seatNumber;
seatNumber++;
}
}

} else {

for(let col=0; col<cols; col++){
for(let row=0; row<rows; row++){
grid[row][col] = seatNumber;
seatNumber++;
}
}

}

for(let row=0; row<rows; row++){

const rowDiv = document.createElement("div");

rowDiv.className =
"flex justify-center gap-2 mb-2";

for(let col=0; col<cols; col++){

createSeat(
rowDiv,
grid[row][col],
type
);

}

parent.appendChild(rowDiv);

}

}

/* Main Container */

seatMap.innerHTML = "";

seatMap.className =
"flex flex-col gap-12 w-full";

/* =========================
TOP SECTION
70 LEFT | ENTRANCE | 70 RIGHT
========================= */

const topSection =
document.createElement("div");

topSection.className =
"flex justify-between items-start w-full px-4";

/* LEFT 70 */

const leftTop =
document.createElement("div");

createRows(
leftTop,
15,
6,
"vip"
);

/* ENTRANCE */

const entrance =
document.createElement("div");

entrance.className =
`

bg-white/5
rounded-xl
flex
justify-center
items-center
text-yellow-400
font-bold
text-xl
`;

entrance.style.height =
"300px";

entrance.style.width =
"500px";

entrance.innerHTML =
`
<div
style="
writing-mode:vertical-rl;
transform:rotate(180deg);
letter-spacing:4px;
">
STAGE
</div>
`;

/* RIGHT 70 */

const rightTop =
document.createElement("div");

createRows(
rightTop,
15,
6,
"vip"
);

topSection.append(
leftTop,
entrance,
rightTop
);

/* =========================
BOTTOM SECTION
120 LEFT | SPACE | 120 RIGHT
========================= */

const bottomSection =
document.createElement("div");

bottomSection.className =
"flex justify-between w-full px-4";

/* LEFT 120 */

const leftBottom =
document.createElement("div");

createRows(
leftBottom,
7,
22,
"premium",
"row"
);

/* EMPTY CENTER */

const middleSpace =
document.createElement("div");

middleSpace.style.width =
"96px";

/* RIGHT 120 */

const rightBottom =
document.createElement("div");

createRows(
rightBottom,
7,
22,
"premium",
"row"
);

bottomSection.append(
leftBottom,
middleSpace,
rightBottom
);

/* Render */

seatMap.append(
topSection,
bottomSection
);

/* ---------- CREATE SEAT FUNCTION ---------- */

function createSeat(parent,id,type){

const seat = document.createElement('div');

seat.className = `seat ${type}`;
seat.innerText = id;
seat.dataset.id = id;

seat.onclick = () => {

if(seat.classList.contains('booked')) return;
if(seat.classList.contains('locked')) return;

if(seat.classList.contains('selected')){
  seat.classList.remove('selected');
  selected = selected.filter(x => x !== id);
} else {
  seat.classList.add('selected');
  if(!selected.includes(id)){
    selected.push(id);
  }
}

updateSummary();

};

parent.appendChild(seat);
}

/* ---------- UPDATE UI ---------- */

function updateSummary(){
document.getElementById('selectedSeats').innerText =
selected.length ? selected.join(', ') : 'None';

document.getElementById('seatCount').innerText =
selected.length;
}

/* ---------- CHECKOUT ---------- */

document.getElementById("checkoutBtn").addEventListener("click", () => {

if(selected.length === 0){
alert("Please select at least one seat.");
return;
}

localStorage.setItem("selectedSeats", JSON.stringify(selected));

window.location.href = "checkout.html";

});

/* ---------- PAN & ZOOM ---------- */

const viewport = document.getElementById('seatMapViewport');
const inner = document.getElementById('seatMapInner');

let scale = 1;
let minScale = 0.4;
let maxScale = 2.5;
let panX = 0;
let panY = 0;

let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let panStartX = 0;
let panStartY = 0;

let dragMoved = false;

function applyTransform(){
inner.style.transform =
`translate(${panX}px, ${panY}px) scale(${scale})`;
}

function centerSeatMap(){

/* Fit the map horizontally inside the viewport on first load */

const vpRect = viewport.getBoundingClientRect();

scale = 1;
applyTransform();

const innerRect = inner.getBoundingClientRect();

const naturalWidth = innerRect.width;
const naturalHeight = innerRect.height;

const fitScale = Math.min(
vpRect.width / naturalWidth,
vpRect.height / naturalHeight,
1
);

scale = Math.max(minScale, Math.min(maxScale, fitScale));

panX = (vpRect.width - naturalWidth * scale) / 2;
panY = 20;

applyTransform();
}

function clampZoom(z){
return Math.max(minScale, Math.min(maxScale, z));
}

function zoomAt(factor, clientX, clientY){

const vpRect = viewport.getBoundingClientRect();

const offsetX = clientX - vpRect.left;
const offsetY = clientY - vpRect.top;

const prevScale = scale;
const newScale = clampZoom(scale * factor);

/* Keep the point under the cursor/finger stable while zooming */

panX = offsetX - ((offsetX - panX) / prevScale) * newScale;
panY = offsetY - ((offsetY - panY) / prevScale) * newScale;

scale = newScale;

applyTransform();

}

/* Mouse drag */

viewport.addEventListener('mousedown', (e) => {
isDragging = true;
dragMoved = false;
dragStartX = e.clientX;
dragStartY = e.clientY;
panStartX = panX;
panStartY = panY;
viewport.classList.add('grabbing');
});

window.addEventListener('mousemove', (e) => {
if(!isDragging) return;

const dx = e.clientX - dragStartX;
const dy = e.clientY - dragStartY;

if(Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;

panX = panStartX + dx;
panY = panStartY + dy;

applyTransform();
});

window.addEventListener('mouseup', () => {
isDragging = false;
viewport.classList.remove('grabbing');
});

/* Prevent seat clicks from firing right after a drag */

viewport.addEventListener('click', (e) => {
if(dragMoved){
e.stopPropagation();
e.preventDefault();
}
}, true);

/* Wheel zoom */

viewport.addEventListener('wheel', (e) => {
e.preventDefault();
const factor = e.deltaY < 0 ? 1.1 : 0.9;
zoomAt(factor, e.clientX, e.clientY);
}, { passive:false });

/* Touch drag + pinch zoom */

let touchStartDist = null;
let touchStartScale = 1;

function getTouchDist(touches){
const dx = touches[0].clientX - touches[1].clientX;
const dy = touches[0].clientY - touches[1].clientY;
return Math.hypot(dx, dy);
}

viewport.addEventListener('touchstart', (e) => {

if(e.touches.length === 1){
isDragging = true;
dragMoved = false;
dragStartX = e.touches[0].clientX;
dragStartY = e.touches[0].clientY;
panStartX = panX;
panStartY = panY;
} else if(e.touches.length === 2){
isDragging = false;
touchStartDist = getTouchDist(e.touches);
touchStartScale = scale;
}

}, { passive:true });

viewport.addEventListener('touchmove', (e) => {

if(e.touches.length === 1 && isDragging){

const dx = e.touches[0].clientX - dragStartX;
const dy = e.touches[0].clientY - dragStartY;

if(Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;

panX = panStartX + dx;
panY = panStartY + dy;

applyTransform();

} else if(e.touches.length === 2 && touchStartDist){

const newDist = getTouchDist(e.touches);
const factor = newDist / touchStartDist;

const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

scale = touchStartScale;
zoomAt(factor, midX, midY);

}

e.preventDefault();

}, { passive:false });

viewport.addEventListener('touchend', () => {
isDragging = false;
touchStartDist = null;
});

/* Zoom buttons */

document.getElementById('zoomInBtn').addEventListener('click', () => {
const r = viewport.getBoundingClientRect();
zoomAt(1.2, r.left + r.width/2, r.top + r.height/2);
});

document.getElementById('zoomOutBtn').addEventListener('click', () => {
const r = viewport.getBoundingClientRect();
zoomAt(0.8, r.left + r.width/2, r.top + r.height/2);
});

document.getElementById('zoomResetBtn').addEventListener('click', () => {
centerSeatMap();
});

/* Initial fit once seats are rendered */

window.addEventListener('load', () => {
setTimeout(centerSeatMap, 50);
});

</script>








<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDaIzeEQkOrziNSXlRHWv-509hYZb4Y7vY",
authDomain: "geththampana-reservations.firebaseapp.com",
projectId: "geththampana-reservations",
storageBucket: "geththampana-reservations.firebasestorage.app",
messagingSenderId: "706440471161",
appId: "1:706440471161:web:d32183dccadad1b835eaa8",
measurementId: "G-R7Y10WQXZ1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app, "geththampana");

async function loadBookedSeats() {

try {

const querySnapshot = await getDocs(
collection(db, "reservations")
);

let booked = [];

querySnapshot.forEach((doc) => {

const data = doc.data();

if (Array.isArray(data.seats)) {
booked = booked.concat(data.seats);
}

});

document.querySelectorAll(".seat").forEach((seat) => {

const id = parseInt(seat.dataset.id);

if (booked.includes(id)) {

seat.classList.add("booked");
seat.classList.add("locked");

seat.classList.remove("selected");

selected = selected.filter(x => x !== id);

seat.style.pointerEvents = "none";

updateSummary();

}

});

}
catch(error){

console.error("Firebase Error:", error);

}

}

loadBookedSeats();

setInterval(loadBookedSeats, 5000);

</script>

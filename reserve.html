<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reserve My Seat | ගෙත්තම්පාන</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Noto Sans Sinhala',sans-serif;
background:#050505;
}

.screen{
background:linear-gradient(90deg,#facc15,#fb923c);
height:80px;
width:90%;
margin:auto;
border-radius:100px;
box-shadow:0 0 50px rgba(255,200,0,.5);
}

.seat{
width:34px;
height:34px;
border-radius:10px;
cursor:pointer;
transition:.3s;
font-size:10px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.seat:hover{
transform:scale(1.15);
}

.vip{
background:#facc15;
color:black;
}

.premium{
background:#3b82f6;
}

.standard{
background:#10b981;
}

.selected{
background:#ef4444 !important;
}

.booked{
background:#444 !important;
cursor:not-allowed;
}

</style>

</head>

<body class="text-white">

<!-- NAV -->

<nav class="border-b border-yellow-500/20 backdrop-blur-md sticky top-0 bg-black/60 z-50">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between">

<h1 class="text-2xl font-bold text-yellow-400">
ගෙත්තම්පාන
</h1>

<a href="index.html"
class="bg-yellow-400 text-black px-5 py-2 rounded-full font-bold">
Back Home
</a>

</div>

</nav>

<!-- HEADER -->

<section class="py-12 text-center">

<h1 class="text-5xl font-extrabold mb-4">
Reserve My Seat
</h1>

<p class="text-gray-400 text-lg">
Select your preferred seat for the musical evening.
</p>

</section>

<!-- LEGEND -->

<div class="flex flex-wrap justify-center gap-6 mb-12">

<div class="flex items-center gap-2">
<div class="w-5 h-5 bg-yellow-400 rounded"></div>
VIP
</div>

<div class="flex items-center gap-2">
<div class="w-5 h-5 bg-blue-500 rounded"></div>
Premium
</div>

<div class="flex items-center gap-2">
<div class="w-5 h-5 bg-emerald-500 rounded"></div>
Standard
</div>

<div class="flex items-center gap-2">
<div class="w-5 h-5 bg-red-500 rounded"></div>
Selected
</div>

</div>

<!-- SCREEN -->

<div class="mb-16">

<div class="screen"></div>

<p class="text-center mt-4 text-yellow-300 tracking-widest">
STAGE
</p>

</div>

<!-- SEAT MAP -->

<div class="max-w-6xl mx-auto px-4">

<div id="seatMap" class="space-y-3"></div>

</div>

<!-- INFO PANEL -->

<div class="max-w-5xl mx-auto mt-16 px-6">

<div class="bg-white/5 rounded-3xl p-8">

<h2 class="text-3xl font-bold mb-4">
Booking Summary
</h2>

<p class="text-lg">
Selected Seats:
<span id="selectedSeats" class="text-yellow-400">
None
</span>
</p>

<p class="text-lg mt-2">
Total Seats:
<span id="seatCount" class="text-yellow-400">
0
</span>
</p>

<button
class="mt-6 bg-yellow-400 text-black px-8 py-4 rounded-full font-bold hover:scale-105 transition">
Proceed to Checkout
</button>

</div>

</div>

<footer class="py-12 text-center text-gray-500">
© 2026 ගෙත්තම්පාන
</footer>

<script>

const seatMap = document.getElementById('seatMap');

let selected = [];

/* ---------- VIP SECTION ---------- */

let seatNumber = 1;

for(let row=1; row<=5; row++){

let rowDiv=document.createElement('div');

rowDiv.className="flex justify-center gap-2";

for(let seat=1; seat<=15; seat++){

createSeat(rowDiv, seatNumber, 'vip');

seatNumber++;

}

seatMap.appendChild(rowDiv);

}

/* ---------- PREMIUM SECTION ---------- */

for(let row=1; row<=10; row++){

let rowDiv=document.createElement('div');

rowDiv.className="flex justify-center gap-2";

for(let seat=1; seat<=20; seat++){

createSeat(rowDiv, seatNumber, 'premium');

seatNumber++;

}

seatMap.appendChild(rowDiv);

}

/* ---------- STANDARD SECTION ---------- */

for(let row=1; row<=6; row++){

let rowDiv=document.createElement('div');

rowDiv.className="flex justify-center gap-2";

for(let seat=1; seat<=15; seat++){

createSeat(rowDiv, seatNumber, 'standard');

seatNumber++;

}

seatMap.appendChild(rowDiv);

}

function createSeat(parent,id,type){

const seat=document.createElement('div');

seat.className=`seat ${type}`;

seat.innerText=id;

seat.dataset.id=id;

seat.onclick=()=>{

if(seat.classList.contains('booked')) return;

seat.classList.toggle('selected');

if(seat.classList.contains('selected')){

selected.push(id);

}else{

selected=selected.filter(x=>x!==id);

}

updateSummary();

};

parent.appendChild(seat);

}

function updateSummary(){

document.getElementById('selectedSeats').innerText =
selected.length ? selected.join(', ') : 'None';

document.getElementById('seatCount').innerText =
selected.length;

}

/* Demo occupied seats */

const bookedSeats=[4,8,12,18,25,33,55,66,88,99,115,145,188,222,256,301,330];

document.querySelectorAll('.seat').forEach(seat=>{

if(bookedSeats.includes(parseInt(seat.dataset.id))){

seat.classList.add('booked');

}

});

</script>

</body>
</html>
